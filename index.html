<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EranMoney  </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap'); 
        body { font-family: 'Tajawal', sans-serif; overflow-x: hidden; } 
        .hidden { display: none !important; } 
        #toast-msg.show { opacity: 1; transform: translate(-50%, -10px); }
        .fade-pulse { animation: fadeInOut 2s ease-in-out infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .slow-spin { animation: spin 3s linear infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen text-right">

    <div id="redirect-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6 bg-[#020617] z-[9999] fixed inset-0">
        <div class="w-12 h-12 border-2 border-blue-500/20 border-t-blue-500 rounded-full slow-spin mb-6"></div>
        <h2 class="text-lg font-bold text-white fade-pulse tracking-wide">جاري التحقق من الأمان...</h2>
        <p class="text-slate-600 text-[10px] mt-2 font-mono">Secure Connection Established</p>
    </div>

    <nav id="nav" class="hidden bg-slate-900/40 backdrop-blur-md p-4 border-b border-white/5 flex justify-between items-center px-6 sticky top-0 z-50">
        <div class="flex flex-col">
            <span class="text-lg font-bold text-blue-500 tracking-tighter">EranMoney</span>
            <span id="user-welcome" class="text-[10px] text-slate-500 italic font-bold">تحميل...</span>
        </div>
        <button onclick="logout()" class="bg-red-500/10 text-red-500 px-4 py-1 rounded-xl border border-red-500/20 text-xs font-bold active:scale-95 transition-all">خروج</button>
    </nav>

    <div id="auth-section" class="hidden flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900/40 backdrop-blur-2xl p-10 rounded-[2.5rem] w-full max-w-md border border-white/5 shadow-2xl relative">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-2xl font-black text-white">تسجيل الدخول</h2>
                <p id="auth-desc" class="text-slate-500 text-xs mt-2 italic">أهلاً بك مروجنا العزيز</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="reg-name" placeholder="الاسم الكامل" class="hidden w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right focus:border-blue-500/50">
                <input type="email" id="auth-email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right focus:border-blue-500/50">
                <input type="password" id="auth-pass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right focus:border-blue-500/50">
                <button id="main-btn" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold shadow-xl transition-all active:scale-95">دخول</button>
                <div class="text-center mt-6">
                    <button id="toggle-btn" onclick="toggleAuth()" class="text-xs text-blue-400 font-bold underline">ليس لديك حساب؟ سجل الآن</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden p-4 max-w-6xl mx-auto space-y-6 mt-6 pb-24">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
            <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2rem]">
                <p class="text-slate-400 text-[11px] mb-1 font-bold">إجمالي الأرباح</p>
                <h3 id="stat-total" class="text-2xl font-bold text-white tracking-tighter">$0.00</h3>
            </div>
            <div class="bg-slate-900/40 border border-blue-500/20 p-6 rounded-[2rem]">
                <p class="text-blue-400 text-[11px] mb-1 font-bold italic underline">أرباح اليوم</p>
                <h3 id="stat-today" class="text-2xl font-bold text-blue-400 tracking-tighter">$0.00</h3>
            </div>
            <div class="bg-slate-900/40 border border-emerald-500/20 p-6 rounded-[2rem]">
                <p class="text-emerald-400 text-[11px] mb-1 font-bold underline">الأرباح القابلة للسحب</p>
                <h3 id="stat-withdrawable" class="text-2xl font-bold text-emerald-400 tracking-tighter">$0.00</h3>
            </div>
            <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2rem]">
                <p class="text-slate-400 text-[11px] mb-1 font-bold">إجمالي النقرات</p>
                <h3 id="stat-clicks" class="text-2xl font-bold text-purple-400 tracking-tighter">0</h3>
            </div>
        </div>

        <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2rem] relative">
            <h4 class="font-bold mb-3 text-[10px] text-slate-400 uppercase tracking-widest pr-2">🔗 رابط التسويق الخاص بك</h4>
            <div class="flex bg-[#020617] rounded-2xl overflow-hidden border border-white/5 p-1 items-center">
                <input type="text" id="ref-link" readonly class="bg-transparent p-3 flex-1 text-[11px] outline-none text-blue-300 text-left font-mono">
                <button onclick="copyRef()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold transition shadow-lg active:scale-90">نسخ</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openWithdraw()" class="bg-emerald-600 p-5 rounded-[2rem] font-bold shadow-lg text-white active:scale-95">💰 طلب سحب</button>
            <a href="https://t.me/eruuiyl" target="_blank" class="bg-slate-800/40 p-5 rounded-[2rem] font-bold border border-white/5 text-center flex items-center justify-center active:scale-95">💬 الدعم</a>
        </div>

        <div id="withdraw-modal" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-emerald-500/20 w-full max-w-md space-y-4">
                <h3 class="text-xl font-bold text-emerald-400 text-center mb-4">سحب الأرباح</h3>
                <div class="space-y-4">
                    <select id="w-method" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm">
                        <option value="ZainCash">Zain Cash - زين كاش</option>
                        <option value="USDT">USDT (TRC20)</option>
                        <option value="AsiaCell">Asiacell - رصيد آسيا</option>
                    </select>
                    <input type="text" id="w-account" placeholder="رقم المحفظة / الحساب" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                    <input type="number" id="w-amount" placeholder="المبلغ (7$ أدنى)" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                    <input type="text" id="w-contact" placeholder="يوزر تليجرام للتواصل" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                    <button onclick="confirmWithdraw()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold shadow-xl active:scale-95">تأكيد الطلب</button>
                    <button onclick="openWithdraw()" class="w-full text-slate-500 text-sm font-bold mt-2 text-center">إلغاء</button>
                </div>
            </div>
        </div>

        <div id="admin-area" class="hidden space-y-8 mt-10 border-t border-white/5 pt-10">
            <div class="bg-red-900/5 border border-red-500/20 p-6 rounded-[2rem]">
                <h2 class="text-red-400 font-bold mb-4 italic underline">⚙️ طلبات السحب الجديدة</h2>
                <div id="withdraw-list" class="space-y-4 text-sm font-bold text-right"></div>
            </div>
        </div>
    </div>

    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[11px] font-bold px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-500 pointer-events-none z-[9999]">
        تم نسخ الرابط بنجاح ✅
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        let isLogin = true;
        const ADMIN_EMAILS = ["xxetali46@gmail.com", "xxetali47@gmail.com"];
        const DEFAULT_MARKETING_LINK = "https://hp.funroom.store/a/8nw6emt2";
        let currentWithdrawable = 0;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'تسجيل الدخول' : 'حساب جديد';
            document.getElementById('auth-desc').innerText = isLogin ? 'أهلاً بك مروجنا العزيز' : 'انضم إلينا وابدأ الربح';
            document.getElementById('main-btn').innerText = isLogin ? 'دخول' : 'إنشاء حساب';
            document.getElementById('toggle-btn').innerText = isLogin ? 'ليس لديك حساب؟ سجل الآن' : 'لديك حساب؟ سجل دخولك';
            document.getElementById('reg-name').classList.toggle('hidden', isLogin);
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const name = document.getElementById('reg-name').value;
            if (!email || !pass) return alert("يرجى ملء الحقول المطلوبة");
            try {
                if (isLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    if (!name) return alert("يرجى كتابة اسمك الكامل");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.ref('users/' + res.user.uid).set({
                        username: name, email: email, totalBalance: 0, todayBalance: 0, withdrawableBalance: 0, clicks: 0, marketingLink: DEFAULT_MARKETING_LINK, joinDate: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            } catch (e) { alert("خطأ: " + e.message); }
        }

        function copyRef() {
            const el = document.getElementById('ref-link');
            el.select();
            el.setSelectionRange(0, 99999);
            try {
                navigator.clipboard.writeText(el.value).then(() => showToast());
            } catch (err) {
                document.execCommand('copy');
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast-msg');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        async function handleVisitor(id) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const vIp = ipData.ip.replace(/\./g, '_'); 
                const ipRef = db.ref('ip_logs/' + id + '/' + vIp);
                const userRef = db.ref('users/' + id);
                const ipSnap = await ipRef.get();
                const now = Date.now();

                if (ipSnap.exists() && (now - ipSnap.val() < 86400000)) { 
                    finalizeRedirect(userRef); 
                } else {
                    await ipRef.set(now);
                    await userRef.transaction(d => {
                        if (d) {
                            d.clicks = (d.clicks || 0) + 1;
                            d.todayBalance = Number(((d.todayBalance || 0) + 0.02).toFixed(2));
                            d.totalBalance = Number(((d.totalBalance || 0) + 0.02).toFixed(2));
                            d.withdrawableBalance = Number(((d.withdrawableBalance || 0) + 0.02).toFixed(2));
                        }
                        return d;
                    });
                    finalizeRedirect(userRef);
                }
            } catch (e) { window.location.href = DEFAULT_MARKETING_LINK; }
        }

        function finalizeRedirect(ref) {
            ref.get().then(snap => {
                const link = (snap.val() && snap.val().marketingLink) ? snap.val().marketingLink : DEFAULT_MARKETING_LINK;
                setTimeout(() => { window.location.href = link; }, 1000);
            });
        }

        function checkRoute() {
            const pId = new URLSearchParams(window.location.search).get('id');
            if (pId) { 
                document.getElementById('redirect-screen').classList.remove('hidden'); 
                handleVisitor(pId); 
            } else { 
                auth.onAuthStateChanged(user => {
                    if (user) {
                        showUI('dashboard-section'); 
                        loadUserData(user); 
                        if (ADMIN_EMAILS.includes(user.email)) { 
                            document.getElementById('admin-area').classList.remove('hidden'); 
                            loadAdminData(); 
                        }
                    } else { showUI('auth-section'); }
                });
            }
        }

        function loadUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val(); if(!d) return;
                document.getElementById('stat-total').innerText = `$${(d.totalBalance || 0).toFixed(2)}`;
                document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
                document.getElementById('stat-withdrawable').innerText = `$${(d.withdrawableBalance || 0).toFixed(2)}`;
                document.getElementById('stat-clicks').innerText = d.clicks || 0;
                document.getElementById('user-welcome').innerText = `أهلاً، ${d.username}`;
                const cleanURL = window.location.origin + window.location.pathname;
                document.getElementById('ref-link').value = cleanURL + "?id=" + user.uid;
                currentWithdrawable = d.withdrawableBalance || 0;
            });
        }

        function confirmWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount').value);
            const account = document.getElementById('w-account').value;
            const contact = document.getElementById('w-contact').value;
            if (isNaN(amount) || amount < 7) return alert("الحد الأدنى للسحب هو 7$");
            if (amount > currentWithdrawable) return alert("رصيدك الحالي لا يكفي");
            if (!account || !contact) return alert("يرجى إكمال المعلومات");

            db.ref('users/' + auth.currentUser.uid).transaction(d => {
                if (d && (d.withdrawableBalance || 0) >= amount) {
                    d.withdrawableBalance = Number((d.withdrawableBalance - amount).toFixed(2));
                    return d;
                }
            }, (err, comm) => {
                if (comm) {
                    db.ref('withdrawals').push({ 
                        uid: auth.currentUser.uid, amount, method: document.getElementById('w-method').value,
                        account, contact, status: 'pending', timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                    alert("تم إرسال الطلب بنجاح!"); openWithdraw();
                }
            });
        }

        function loadAdminData() {
            db.ref('withdrawals').on('value', snap => {
                const list = document.getElementById('withdraw-list'); list.innerHTML = "";
                const data = snap.val(); if(!data) return;
                for (let id in data) {
                    if(data[id].status === 'paid') continue;
                    list.innerHTML += `
                    <div class="bg-[#020617] p-5 rounded-2xl border-r-4 border-amber-500 mb-3 text-right">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-white text-lg font-bold">$${data[id].amount}</span>
                            <button onclick="db.ref('withdrawals/${id}').update({status: 'paid'})" class="bg-emerald-600 px-4 py-1 rounded-xl text-[10px]">دفع</button>
                        </div>
                        <p class="text-blue-400 text-xs font-bold">الحساب: ${data[id].account}</p>
                        <p class="text-slate-500 text-[9px] font-bold">تواصل: ${data[id].contact}</p>
                    </div>`;
                }
            });
        }

        function showUI(id) {
            document.querySelectorAll('#auth-section, #dashboard-section, #nav').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-section') document.getElementById('nav').classList.remove('hidden');
        }
        function openWithdraw() { document.getElementById('withdraw-modal').classList.toggle('hidden'); }
        function logout() { auth.signOut(); }
        checkRoute();
    </script>
</body>
</html>
